# Zone B Place 환경 수치 - robot 20 cm behind stop_line
# 목적: 로봇 base_link는 고정하고, place 환경 전체를 +x 방향으로 0.20 m 이동
# 효과: 로봇이 초록색 정지선 중심보다 20 cm 뒤에 서 있는 것과 같은 배치
# 단위: 미터 (m)
#
# 기존 zone_b_place.yaml 기준 추가 변환:
#   x_new = x_place + 0.20
#   y_new = y_place
#   z 값과 각 물체 크기는 변경하지 않음
#
# 좌표축:
#   +x: 로봇 정면
#   +y: 로봇 좌측
#   +z: 위
#
zone_b:
  conveyor:
    length: 3.0
    depth: 0.4
    height: 0.6
    center_x: 0.75
    center_y: 3.8
  box:
    width: 0.41
    depth: 0.31
    height: 0.28
    mass_kg: 1.0
    center_x: 0.75
    center_y: 3.8
  dest_table:
    width: 1.6
    depth: 0.8
    height: 0.8
    top_thickness: 0.02
    leg_size: 0.05
    leg_inset: 0.025
    center_x: 0.75
    center_y: 0.0
  landing_marker:
    size_x: 0.4
    size_y: 0.5
    thickness: 0.005
    center_x: 0.65
    center_y: 0.0
  stop_line:
    length: 1.6
    thickness: 0.05
    height: 0.005
    center_x: 0.2
    center_y: 0.0
# Zone B (부품 운반) 환경 수치
# 기준: 참가팀공유2026휴머노이드챌린지_0618_v4.pdf
# 단위: 미터 (m)
#
# ── 좌표축 ──────────────────────────────────────────
#  x: 로봇 정면 (벽과 수직, 로봇 접근 방향)
#  y: 로봇 좌측 (벽을 따라가는 방향)
#  z: 위
#
# ── 가로(y) 배치 — 컨베이어·테이블 나란히 ──────────
#  컨베이어(3000mm) → 간격(1500mm) → 테이블(1600mm)
#  검산: conv_far_y(-0.750) + gap(1.500) = table_near_y(+0.750) OK
#
# ── 세로(x) 배치 — 테이블 국소 좌표 ────────────────
#  정지선: 테이블 앞 엣지(x=0.600) 에서 150mm 앞(x=0.450)
#  안착 마커: 테이블 앞 엣지에서 100mm 안쪽부터 400mm 구간

zone_b:
  conveyor:                 # 롤러형 컨베이어 벨트 (충돌체)
    length: 3.000           # y방향 (벽을 따라, W3000mm)
    depth: 0.400            # x방향 (로봇 접근, D400mm)
    height: 0.600           # z방향 (H600mm = 작업면 높이)
    # TODO: 현장 실측 필요 — 로봇과 컨베이어 거리(x), 컨베이어 y 시작 위치
    center_x: 1.000
    center_y: 2.250         # 컨베이어 중심 y (로봇 좌측 +y)

  box:                      # 우체국 4호 박스 (파지 대상, 충돌체)
    width: 0.410            # y방향 (W410mm)
    depth: 0.310            # x방향 (D310mm)
    height: 0.280           # z방향 (H280mm)
    mass_kg: 1.0
    # TODO: 컨베이어 위 정확한 y 위치 미표기 → 현장 실측 필요
    # 임시: 컨베이어 중앙
    center_x: 1.000
    center_y: 2.250

  dest_table:               # 목적지 화이트 테이블 (충돌체, A/C/D와 동일 규격)
    width: 1.600            # y방향 (W1600mm)
    depth: 0.800            # x방향 (D800mm)
    height: 0.800           # H800mm
    top_thickness: 0.020
    leg_size: 0.050
    leg_inset: 0.025
    # center_y: conv_cy(+2.250) - conv_hy(1.500) - gap(1.500) - table_hy(0.800) = -1.550
    # 검산: conv_far_y(+0.750) - gap(1.500) = table_near_y(-0.750), center_y = -0.750 - 0.800 = -1.550
    # TODO: 현장 실측 후 x 보정 필요 (컨베이어와 같은 깊이 가정)
    center_x: 1.000
    center_y: -1.550

  landing_marker:           # 안착 마커 (시각화 전용, 충돌체 X, 녹색)
    size_x: 0.400           # x방향 깊이 (100~500mm 구간 = 400mm)
    size_y: 0.500           # y방향 폭 (500mm)
    thickness: 0.005
    # center_x: 테이블 앞 엣지(0.600) + 100mm + 반깊이(200mm) = 0.900
    # center_y: 테이블 y 중앙 = -1.550
    center_x: 0.900
    center_y: -1.550

  stop_line:                # 정지선 (시각화 전용, 충돌체 X, 녹색)
    # 테이블 정면 바닥, 로봇이 박스 내려놓을 때 멈추는 기준선
    length: 1.600           # y방향 (테이블 폭과 동일)
    thickness: 0.050        # x방향 두께 (폭 미표기 → 50mm 임의)
    height: 0.005           # 바닥 위 얇게
    # center_x: 테이블 앞 엣지(0.600) - 150mm = 0.450
    center_x: 0.450
    center_y: -1.550

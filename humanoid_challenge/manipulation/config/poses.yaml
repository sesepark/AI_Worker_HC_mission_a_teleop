# 주요 arm pose 정의
# 단위: 미터, quaternion (xyzw)
# capture_r은 임시값 — 실물 로봇 텔레옵으로 wrist cam top-down 자세 확인 후 갱신

poses:
  # wrist cam으로 yellow_box 내부를 촬영하는 대기 자세 (right arm)
  # inset=0.300 기준, yellow_box 중앙 위
  # 시뮬에서 top-down(pitch=90) IK 불가 → identity quat 임시 사용
  capture_r:
    x: 0.270
    y: -0.250
    z: 1.020
    qx: 0.0
    qy: 0.0
    qz: 0.0
    qw: 1.0

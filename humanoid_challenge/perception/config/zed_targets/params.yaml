green_button_center:
  ros__parameters:
    rgb_topic: /zed/zed_node/rgb/image_rect_color
    depth_topic: /zed/zed_node/depth/depth_registered
    rgb_info_topic: /zed/zed_node/rgb/camera_info
    depth_info_topic: /zed/zed_node/depth/camera_info
    detections_topic: /detections/scenario_c/green_button
    detections_msg_type: single
    out_pose_topic: /perception/zed/green_button_center
    base_frame: base_link
    camera_frame: ""
    camera_name: zed
    target_class: green_button
    min_confidence: 0.3
    bbox_format: xyxy
    select_policy: confidence
    min_depth_m: 0.15
    max_depth_m: 5.0
    depth_window_px: 5
    surface_inner_scale: 0.80
    surface_depth_percentile: 50.0
    top_depth_percentile: 35.0
    mask_erosion_px: 0
    min_bbox_width_px: 5
    min_bbox_height_px: 5
    max_bbox_width_px: 10000
    max_bbox_height_px: 10000
    intersect_ring_with_mask: false
    ellipse_outer_scale: 1.20
    ellipse_inner_scale: 0.65
    use_detector_center: true
    center_max_offset_ratio: 0.35
    use_plane_fit: true
    plane_fit_min_points: 20
    min_ring_valid_points: 10
    plane_outlier_m: 0.015
    plane_max_mean_residual_m: 0.01
    rim_depth_percentile: 35.0
    sync_queue_size: 10
    sync_slop: 0.1
    tf_lookup_mode: latest
    tf_timeout_sec: 0.05
    max_future_stamp_sec: 0.03
    allow_latest_tf_fallback: true
    output_stamp_policy: now
    log_targets: true
    publish_debug_image: true
    debug_image_topic: /perception/zed/debug/green_button_center_image

